name: Build and Test Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION: 'WebGoat.NET.sln'
  BUILD_PLATFORM: 'Any CPU'
  BUILD_CONFIGURATION: 'Release'
  # Mapping Azure's $(build.artifactStagingDirectory) to a GitHub Actions workspace directory
  ARTIFACT_STAGING_DIR: '${{ github.workspace }}\artifacts'

jobs:
  build:
    name: Run Build and Test Steps
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Required for VSBuild/MSBuild and VSTest to be available in the command line
    - name: Setup MSBuild and VS Test Tools
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Solution
      run: nuget restore ${{ env.SOLUTION }}

    - name: List Root Directory Files
      run: dir
      shell: cmd

    - name: Custom NuGet Restore
      run: nuget restore WebGoat/packages.config -PackagesDirectory packages -Verbosity Detailed

    - name: List packages directory
      run: dir packages
      shell: cmd

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        architecture: x64

    # Equivalent to: VSBuild@1
    - name: Build Solution (VSBuild equivalent)
      run: |
        mkdir "${{ env.ARTIFACT_STAGING_DIR }}"
        msbuild ${{ env.SOLUTION }} /p:Configuration="${{ env.BUILD_CONFIGURATION }}" /p:Platform="${{ env.BUILD_PLATFORM }}" /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="${{ env.ARTIFACT_STAGING_DIR }}"

    # Equivalent to: VSTest@2
    - name: Run VS Tests (VSTest equivalent)
      run: |
        vstest.console.exe "**\bin\${{ env.BUILD_CONFIGURATION }}\*test*.dll" /Platform:${{ env.BUILD_PLATFORM }} /Configuration:${{ env.BUILD_CONFIGURATION }}
    
